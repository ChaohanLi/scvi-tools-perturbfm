program: probe.py
project: peakvi-probe
method: grid
metric:
  goal: maximize
  name: cv_test/macro_f1

parameters:
  dataset_id:
    values:
      - 5w_GSE196830_atac
      - 10w_GSE196830_atac
      - 20w_GSE196830_atac
      - 40w_GSE196830_atac
      - 80w_GSE196830_atac
      - 120w_GSE196830_atac
      - GSE96583_atac

# Fixed args passed to every run.
command:
  - /lichaohan/miniconda3/envs/scvi/bin/python
  - ${program}
  - --wandb_project
  - peakvi-probe
  - --max_epochs
  - "500"
  - --early_stopping
  - --batch_size_train
  - "1024"
  - --n_jobs
  - "16"
  - --save_embeddings
  - ${args}
