program: probe.py
project: scvi-probe
method: grid
metric:
  goal: maximize
  name: cv_test/macro_f1

parameters:
  dataset_id:
    values:
      - 5w_GSE196830__ensembl
      - 5w_GSE196830__hgnc
      - GSE96583__ensembl
      - 10w_GSE196830__ensembl
      - 10w_GSE196830__hgnc
      - 20w_GSE196830__ensembl
      - 20w_GSE196830__hgnc
      - 40w_GSE196830__ensembl
      - 40w_GSE196830__hgnc
      - 80w_GSE196830__ensembl
      - 80w_GSE196830__hgnc
      - 120w_GSE196830__ensembl
      - 120w_GSE196830__hgnc
# Fixed args passed to every run.
# ${args} expands to --dataset_id <value> for each trial.
command:
  - /root/project/chaohan/.conda/bin/python
  - ${program}
  - --wandb_project
  - scvi-probe
  - --max_epochs
  - "500"
  - --early_stopping
  - --batch_size_train
  - "512"
  - --n_jobs
  - "12"
  - --max_samples
  - "0"
  - --save_embeddings
  - ${args}
